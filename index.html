<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - SALC - 8º BIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            /* Gradiente em tons militares */
            background: linear-gradient(135deg, #2d3a2a 0%, #4a5d44 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 2px solid #3e4c39;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Card de Login -->
        <div class="glass-card rounded-2xl shadow-2xl p-8 space-y-6">
            <div class="text-center">
                <!-- Espaço para a Imagem do 8º BIS -->
                <div class="mb-4 flex justify-center">
                    <img 
                        src="https://www.eb.mil.br/documents/10138/10531584/8bis.png" 
                        alt="Logotipo 8º BIS" 
                        class="h-32 w-auto object-contain drop-shadow-md"
                        onerror="this.src='https://via.placeholder.com/150?text=8%C2%BA+BIS'"
                    >
                </div>
                
                <h1 class="text-2xl font-bold text-gray-800">SALC</h1>
                <p class="text-green-800 font-semibold text-sm mt-1 uppercase tracking-wider">8º Batalhão de Infantaria de Selva</p>
                <div class="h-1 w-16 bg-green-700 mx-auto mt-2 rounded-full"></div>
            </div>

            <!-- Formulário -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="username">Usuário (Login)</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="SALC"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-600 focus:border-transparent outline-none transition-all uppercase"
                        required
                    >
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="password">Senha de Acesso</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-600 focus:border-transparent outline-none transition-all"
                        required
                    >
                </div>

                <!-- Mensagem de Feedback -->
                <div id="feedback" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>

                <button 
                    type="submit" 
                    class="w-full bg-green-800 hover:bg-green-900 text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition-all active:scale-[0.98] uppercase tracking-widest"
                >
                    Entrar
                </button>
            </form>

            <div class="pt-4 text-center border-t border-gray-100">
                <p class="text-[10px] text-gray-400 uppercase">Sistema Interno de Controle</p>
            </div>
        </div>
        
        <p class="text-center text-gray-200 text-xs mt-6 opacity-80">
            © 2024 - seção de aquisições, licitações e contratos"
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const feedback = document.getElementById('feedback');
            
            // Lógica de Validação conforme solicitado
            if (username.toUpperCase() === 'SALC') {
                feedback.textContent = "Acesso autorizado! Iniciando sessão...";
                feedback.className = "text-green-800 bg-green-100 p-3 rounded-lg text-center font-medium block border border-green-200";
                
                setTimeout(() => {
                    feedback.textContent = "Bem-vindo à Seção de Aquisições, Licitações e Contratos.";
                }, 1500);
            } else {
                feedback.textContent = "Credenciais inválidas para o setor SALC.";
                feedback.className = "text-red-700 bg-red-100 p-3 rounded-lg text-center font-medium block border border-red-200";
                document.getElementById('username').focus();
            }
        });
    </script>
</body>
</html>
